defaults
  mode http
  timeout client 10s
  timeout connect 5s
  timeout server 10s
  timeout http-request 10s

global
  maxconn 100

frontend http_front
  bind *:80
  default_backend http_back

backend http_back
  balance roundrobin
  option httpchk GET /
  http-check expect status 200
  server web1 webserver1:80 check inter 5s fall 3 rise 2
  server web2 webserver2:80 check inter 5s fall 3 rise 2
